name = "myproduct"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# @opennextjs/cloudflare: Workers 진입점
main = ".open-next/worker.js"

# 정적 자산 바인딩 (Worker에서 env.ASSETS로 접근)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Browser Rendering 바인딩 (증명서 PDF 생성용)
[browser]
binding = "BROWSER"

# 환경 변수는 CF 대시보드 > Workers > Settings > Variables 에서 설정
