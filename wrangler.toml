name = "myproduct"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# @opennextjs/cloudflare: Workers 진입점
main = ".open-next/worker.js"

# 정적 자산 바인딩 (Worker에서 env.ASSETS로 접근)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Browser Rendering 바인딩 (증명서 PDF 생성용)
[browser]
binding = "BROWSER"

# 공개 환경변수는 코드로 관리 (배포마다 자동 동기화)
# 시크릿(SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_ANON_KEY, ANTHROPIC_API_KEY)은 CF 대시보드에서 별도 관리
[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://lkejzmtgpktrlnkkhatb.supabase.co"
NEXT_PUBLIC_SITE_URL = "https://myproduct.kr"
